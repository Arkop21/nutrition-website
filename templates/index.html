<!DOCTYPE html>
<html>
<head>
    <title>Nutrition Calculator</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            width: 400px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
            border: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #38bdf8;
            border: none;
            border-radius: 8px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Nutrition Calculator</h2>

    <form method="POST">
        <input name="age" placeholder="Age" required>
        <input name="weight" placeholder="Weight" required>

        <select name="weight_unit">
            <option value="kg">Kg</option>
            <option value="pounds">Pounds</option>
        </select>

        <input name="height" placeholder="Height" required>

        <select name="height_unit">
            <option value="cm">Cm</option>
            <option value="feet">Feet</option>
        </select>

        <select name="gender">
            <option>Male</option>
            <option>Female</option>
        </select>

        <select name="activity">
            <option>Lazy</option>
            <option>Normal</option>
            <option>Active</option>
        </select>

        <select name="goal">
            <option value="weight_loss">Weight Loss</option>
            <option value="weight_gain">Weight Gain</option>
            <option value="weight_maintain">Maintain</option>
        </select>

        <button type="submit">Calculate</button>
    </form>
</div>

</body>
</html>
