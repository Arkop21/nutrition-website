<!DOCTYPE html>
<html>
<head>
    <title>AI Nutrition Planner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #0f172a, #020617);
            color: white;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 480px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            margin-bottom: 5px;
            font-size: 28px;
        }

        p {
            text-align: center;
            opacity: 0.7;
            margin-bottom: 25px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 12px;
            border: none;
            background: rgba(255,255,255,0.08);
            color: white;
            outline: none;
            font-size: 14px;
        }

        option {
            color: black;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(90deg, #38bdf8, #6366f1);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.03);
            opacity: 0.9;
        }

        .footer {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            opacity: 0.5;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="card">

        <h1>AI Nutrition Planner</h1>
        <p>Build your perfect diet plan in seconds</p>

        <form method="POST">

            <input name="age" placeholder="Age" required>
            <input name="weight" placeholder="Weight" required>

            <select name="weight_unit">
                <option value="kg">Kg</option>
                <option value="pounds">Pounds</option>
            </select>

            <input name="height" placeholder="Height" required>

            <select name="height_unit">
                <option value="cm">Cm</option>
                <option value="feet">Feet</option>
            </select>

            <select name="gender">
                <option>Male</option>
                <option>Female</option>
            </select>

            <select name="activity">
                <option>Lazy</option>
                <option>Normal</option>
                <option>Active</option>
            </select>

            <select name="goal">
                <option value="weight_loss">Lose Weight</option>
                <option value="weight_gain">Gain Weight</option>
                <option value="weight_maintain">Maintain</option>
            </select>

            <button type="submit">Generate Plan</button>

        </form>

        <div class="footer">
            Powered by Flask + AI
        </div>

    </div>

</div>

</body>
</html>
