<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Nutritionist</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

/* Glass Container */
.container {
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 30px;
    width: 420px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

/* Title */
h1 {
    text-align: center;
    margin-bottom: 20px;
    font-weight: 600;
}

/* Inputs */
input, select {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    margin-bottom: 15px;
    border: none;
    border-radius: 10px;
    outline: none;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* Results */
.results {
    margin-top: 20px;
    padding: 15px;
    border-radius: 15px;
    background: rgba(0,0,0,0.3);
}

.ai-box {
    margin-top: 15px;
    padding: 15px;
    border-radius: 15px;
    background: rgba(0,0,0,0.5);
    white-space: pre-wrap;
}
</style>

</head>
<body>

<div class="container">

    <h1>💪 AI Diet Planner</h1>

    <form method="POST">

        <label>Age</label>
        <input type="number" name="age" required>

        <label>Weight</label>
        <input type="number" step="any" name="weight" required>
        <select name="weight_unit">
            <option value="kg">kg</option>
            <option value="pounds">pounds</option>
        </select>

        <label>Height</label>
        <input type="number" step="any" name="height" required>
        <select name="height_unit">
            <option value="cm">cm</option>
            <option value="feet">feet</option>
            <option value="m">meters</option>
        </select>

        <label>Gender</label>
        <select name="gender">
            <option>Male</option>
            <option>Female</option>
        </select>

        <label>Activity</label>
        <select name="activity">
            <option>Lazy</option>
            <option>Normal</option>
            <option>Active</option>
        </select>

        <label>Goal</label>
        <select name="goal">
            <option value="weight_loss">Weight Loss</option>
            <option value="weight_gain">Weight Gain</option>
            <option value="maintain">Maintain</option>
        </select>

        <button type="submit">⚡ Generate Plan</button>
    </form>

    {% if BMI %}
    <div class="results">
        <h3>📊 Your Stats</h3>
        <p><b>BMI:</b> {{ BMI }}</p>
        <p><b>Status:</b> {{ status }}</p>
        <p><b>Calories:</b> {{ calories }}</p>
        <p><b>Protein:</b> {{ protein }} g</p>
        <p><b>Fat:</b> {{ fat }} g</p>
        <p><b>Carbs:</b> {{ carbs }} g</p>
    </div>
    {% endif %}

    {% if ai_plan %}
    <div class="ai-box">
        <h3>🤖 AI Diet Plan</h3>
        {{ ai_plan }}
    </div>
    {% endif %}

</div>

</body>
</html>
