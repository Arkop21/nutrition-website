<!DOCTYPE html>
<html>
<head>
    <title>AI Nutrition App</title>
    <style>
        body {
            margin:0;
            font-family:Arial;
            background:#0f172a;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }
        .card {
            background:#1e293b;
            padding:25px;
            border-radius:15px;
            width:350px;
        }
        input,select {
            width:100%;
            margin:5px 0;
            padding:8px;
        }
        button {
            width:100%;
            padding:10px;
            background:#38bdf8;
            border:none;
            cursor:pointer;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>AI Nutrition</h2>

    <form method="POST">

        <input name="age" placeholder="Age">
        <input name="weight" placeholder="Weight">

        <select name="weight_unit">
            <option value="kg">Kg</option>
            <option value="pounds">Pounds</option>
        </select>

        <input name="height" placeholder="Height">

        <select name="height_unit">
            <option value="cm">Cm</option>
            <option value="feet">Feet</option>
        </select>

        <select name="gender">
            <option>Male</option>
            <option>Female</option>
        </select>

        <select name="activity">
            <option>Lazy</option>
            <option>Normal</option>
            <option>Active</option>
        </select>

        <select name="goal">
            <option value="weight_loss">Lose Weight</option>
            <option value="weight_gain">Gain Weight</option>
            <option value="weight_maintain">Maintain</option>
        </select>

        <button type="submit">Generate</button>

    </form>
</div>

</body>
</html>
