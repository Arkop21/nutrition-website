<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Fitness Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:white;
}

.container {
    display:grid;
    grid-template-columns: 350px 1fr;
    height:100vh;
}

.sidebar {
    background:#020617;
    padding:20px;
}

.main {
    padding:30px;
}

.card {
    background:#111827;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

input, select {
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:8px;
    border:none;
}

button {
    width:100%;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
}

/* Progress bars */
.bar {
    background:#333;
    height:10px;
    border-radius:10px;
    margin-bottom:10px;
}

.fill {
    height:10px;
    background:#3b82f6;
    border-radius:10px;
}

/* Chat */
.chat {
    background:#020617;
    padding:15px;
    border-radius:10px;
    height:200px;
    overflow:auto;
    white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
<h2>AI Fitness</h2>

<form method="POST">
<input name="age" placeholder="Age" required>
<input name="weight" placeholder="Weight" required>

<select name="weight_unit">
<option value="kg">kg</option>
<option value="pounds">pounds</option>
</select>

<input name="height" placeholder="Height" required>

<select name="height_unit">
<option value="cm">cm</option>
<option value="feet">feet</option>
<option value="m">meters</option>
</select>

<select name="gender">
<option>Male</option>
<option>Female</option>
</select>

<select name="activity">
<option>Lazy</option>
<option>Normal</option>
<option>Active</option>
</select>

<select name="goal">
<option value="weight_loss">Weight Loss</option>
<option value="weight_gain">Weight Gain</option>
<option value="maintain">Maintain</option>
</select>

<button type="submit">Generate</button>
</form>
</div>

<div class="main">

{% if BMI %}
<div class="card">
<h3>Stats</h3>
<p>BMI: {{ BMI }}</p>
<p>Status: {{ status }}</p>
<p>Calories: {{ calories }}</p>
</div>

{% set total = protein + fat + carbs %}

<div class="card">
<h3>Macros</h3>

<p>Protein {{ protein }}g</p>
<div class="bar"><div class="fill" style="width: {{ (protein/total)*100 }}%"></div></div>

<p>Fat {{ fat }}g</p>
<div class="bar"><div class="fill" style="width: {{ (fat/total)*100 }}%"></div></div>

<p>Carbs {{ carbs }}g</p>
<div class="bar"><div class="fill" style="width: {{ (carbs/total)*100 }}%"></div></div>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>
{% endif %}

{% if ai_plan %}
<div class="card">
<h3>AI Plan</h3>
<div id="chat" class="chat"></div>
</div>
{% endif %}

</div>

</div>

<script>
// chart
{% if chart_data %}
let data = {{ chart_data|safe }};
new Chart(document.getElementById("chart"), {
    type: "doughnut",
    data: {
        labels: ["Protein","Fat","Carbs"],
        datasets: [{
            data: [data.protein, data.fat, data.carbs]
        }]
    }
});
{% endif %}

// typing effect
{% if ai_plan %}
let text = `{{ ai_plan }}`;
let i = 0;

function type() {
    if (i < text.length) {
        document.getElementById("chat").innerHTML += text.charAt(i);
        i++;
        setTimeout(type, 15);
    }
}
type();
{% endif %}
</script>

</body>
</html>
