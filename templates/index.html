<!DOCTYPE html>
<html>
<head>
    <title>AI Nutrition Planner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: #111827;
            padding: 30px;
            border-radius: 16px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 0 25px rgba(0,0,0,0.5);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #38bdf8;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            background: #1f2937;
            color: white;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background: #38bdf8;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0ea5e9;
        }

        .small {
            font-size: 12px;
            text-align: center;
            margin-top: 10px;
            opacity: 0.7;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Nutrition AI Planner</h2>

    <form method="POST">
        <input name="age" placeholder="Age" required>
        <input name="weight" placeholder="Weight" required>

        <select name="weight_unit">
            <option value="kg">Kg</option>
            <option value="pounds">Pounds</option>
        </select>

        <input name="height" placeholder="Height" required>

        <select name="height_unit">
            <option value="cm">Cm</option>
            <option value="feet">Feet</option>
        </select>

        <select name="gender">
            <option>Male</option>
            <option>Female</option>
        </select>

        <select name="activity">
            <option>Lazy</option>
            <option>Normal</option>
            <option>Active</option>
        </select>

        <select name="goal">
            <option value="weight_loss">Lose Weight</option>
            <option value="weight_gain">Gain Weight</option>
            <option value="weight_maintain">Maintain</option>
        </select>

        <button type="submit">Generate Plan</button>
    </form>

    <div class="small">Built with Flask</div>
</div>

</body>
</html>
