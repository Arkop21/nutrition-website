<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Nutritionist Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #141e30, #243b55);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    transition: 0.3s;
}

.dark {
    background: linear-gradient(135deg, #000000, #434343);
}

.container {
    width: 900px;
    backdrop-filter: blur(25px);
    background: rgba(255,255,255,0.08);
    border-radius: 25px;
    padding: 30px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 25px;
}

/* LEFT SIDE */
.form-box {
    display: flex;
    flex-direction: column;
}

h1 {
    margin-bottom: 15px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0 12px;
    border-radius: 10px;
    border: none;
    outline: none;
}

button {
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* RIGHT SIDE */
.output-box {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

/* Cards */
.card {
    background: rgba(0,0,0,0.4);
    padding: 15px;
    border-radius: 15px;
}

/* Progress bars */
.bar {
    height: 10px;
    border-radius: 10px;
    background: rgba(255,255,255,0.2);
    margin-top: 5px;
}

.fill {
    height: 100%;
    border-radius: 10px;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
}

/* AI Chat box */
.ai-box {
    background: rgba(0,0,0,0.6);
    padding: 15px;
    border-radius: 15px;
    max-height: 250px;
    overflow-y: auto;
    white-space: pre-wrap;
}

/* Toggle */
.toggle {
    position: absolute;
    top: 20px;
    right: 20px;
    cursor: pointer;
    padding: 8px 12px;
    border-radius: 10px;
    background: rgba(255,255,255,0.2);
}

/* Responsive */
@media(max-width: 900px) {
    .container {
        grid-template-columns: 1fr;
        width: 95%;
    }
}
</style>
</head>

<body>

<div class="toggle" onclick="toggleMode()">🌙 Toggle</div>

<div class="container">

<!-- LEFT -->
<div class="form-box">
    <h1>💪 AI Fitness Pro</h1>

    <form method="POST">

        <input type="number" name="age" placeholder="Age" required>

        <input type="number" step="any" name="weight" placeholder="Weight" required>
        <select name="weight_unit">
            <option value="kg">kg</option>
            <option value="pounds">pounds</option>
        </select>

        <input type="number" step="any" name="height" placeholder="Height" required>
        <select name="height_unit">
            <option value="cm">cm</option>
            <option value="feet">feet</option>
            <option value="m">meters</option>
        </select>

        <select name="gender">
            <option>Male</option>
            <option>Female</option>
        </select>

        <select name="activity">
            <option>Lazy</option>
            <option>Normal</option>
            <option>Active</option>
        </select>

        <select name="goal">
            <option value="weight_loss">Weight Loss</option>
            <option value="weight_gain">Weight Gain</option>
            <option value="maintain">Maintain</option>
        </select>

        <button type="submit">⚡ Generate Plan</button>
    </form>
</div>

<!-- RIGHT -->
<div class="output-box">

{% if BMI %}
<div class="card">
    <h3>📊 Stats</h3>
    <p>BMI: {{ BMI }}</p>
    <p>Status: {{ status }}</p>
    <p>Calories: {{ calories }}</p>
</div>

<div class="card">
    <h3>🍗 Macros</h3>

    <p>Protein ({{ protein }}g)</p>
    <div class="bar"><div class="fill" style="width: {{ protein/2 }}%"></div></div>

    <p>Fat ({{ fat }}g)</p>
    <div class="bar"><div class="fill" style="width: {{ fat/2 }}%"></div></div>

    <p>Carbs ({{ carbs }}g)</p>
    <div class="bar"><div class="fill" style="width: {{ carbs/3 }}%"></div></div>
</div>
{% endif %}

{% if ai_plan %}
<div class="ai-box">
    🤖 {{ ai_plan }}
</div>
{% endif %}

</div>

</div>

<script>
function toggleMode() {
    document.body.classList.toggle("dark");
}
</script>

</body>
</html>
